# Paddle Inference + TensorRT INT8 calibration example.
# Prepare data/int8_calib_images.txt first with:
#   python3 scripts/prepare_int8_calibration_list.py data/calib_images \
#     --output data/int8_calib_images.txt --limit 512 --relative-to data

input:
  source_type: image_list
  path: "../data/int8_calib_images.txt"
  num_streams: 1
  # 0 means consume the full image list.
  num_frames: 0
  synthetic_width: 640
  synthetic_height: 360
  synthetic_channels: 3

model:
  input_width: 640
  input_height: 640
  num_classes: 3
  mock_num_boxes: 3

preprocess:
  type: cpu

infer:
  backend: paddle_trt
  precision: int8
  batch_size: 1
  enable_dynamic_batch: false
  dynamic_batch_timeout_ms: 10

paddle:
  model_file: "../models/inference.pdmodel"
  params_file: "../models/inference.pdiparams"
  model_dir: ""
  use_gpu: true
  gpu_mem_mb: 1024
  gpu_device_id: 0
  enable_ir_optim: true
  enable_memory_optim: true

trt:
  enable: true
  workspace_size: 1073741824
  max_batch_size: 1
  min_subgraph_size: 3
  precision: int8
  use_static: false
  use_calib_mode: true
  cache_dir: "../trt_cache/int8_engine"
  int8_calib_images: "../data/int8_calib_images.txt"
  calib_batch_size: 1
  calib_num_batches: 512
  calib_cache_dir: "../trt_cache/int8_calib"
  enable_dynamic_shape: false
  dynamic_shape_input_name: ""
  min_input_shape: "1,3,640,640"
  opt_input_shape: "1,3,640,640"
  max_input_shape: "1,3,640,640"
  disable_plugin_fp16: true

trt_analysis:
  enable: true
  log_path: "../logs/paddle_trt_int8_calib_analysis.log"
  report_json: "../benchmarks/trt_subgraph_report_int8_calib.json"
  report_md: "../benchmarks/trt_subgraph_report_int8_calib.md"

postprocess:
  # Keep raw until the real Paddle output decoder is wired.
  mode: raw
  decode_backend: cpu
  nms_backend: cpu
  score_threshold: 0.25
  nms_threshold: 0.45
  top_k: 100

profile:
  enable_timer: true

output:
  save_result: false
  result_path: "outputs/paddle_trt_int8_calib.txt"

benchmark:
  warmup_iters: 0
  # 0 means run until the calibration image list is exhausted.
  benchmark_iters: 0
  output_csv: "../benchmarks/paddle_trt_int8_calib.csv"
