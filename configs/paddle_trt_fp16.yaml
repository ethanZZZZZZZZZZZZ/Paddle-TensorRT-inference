# Paddle Inference + TensorRT FP16 subgraph acceleration example.
# This uses Paddle Inference's internal TensorRT integration, not a hand-written
# TensorRT engine.

input:
  source_type: synthetic
  path: "synthetic://mock"
  # Start TensorRT subgraph validation with one stream and batch=1 unless the
  # exported model is confirmed to support dynamic batch.
  num_streams: 1
  num_frames: 3
  synthetic_width: 640
  synthetic_height: 360
  synthetic_channels: 3

model:
  input_width: 640
  input_height: 640
  num_classes: 3
  mock_num_boxes: 3

preprocess:
  type: cpu

infer:
  backend: paddle_trt
  precision: fp16
  batch_size: 1
  enable_dynamic_batch: false
  dynamic_batch_timeout_ms: 10

paddle:
  model_file: "../models/inference.pdmodel"
  params_file: "../models/inference.pdiparams"
  model_dir: ""
  use_gpu: true
  gpu_mem_mb: 1024
  gpu_device_id: 0
  enable_ir_optim: true
  enable_memory_optim: true

trt:
  enable: true
  workspace_size: 1073741824
  max_batch_size: 1
  min_subgraph_size: 3
  precision: fp16
  use_static: false
  use_calib_mode: false
  cache_dir: "../trt_cache"
  # If TRT engine build fails in concat/reshape/dynamic layers, first run
  # configs/paddle.yaml and copy the printed paddle_input name here.
  enable_dynamic_shape: false
  dynamic_shape_input_name: ""
  min_input_shape: "1,3,640,640"
  opt_input_shape: "1,3,640,640"
  max_input_shape: "1,3,640,640"
  disable_plugin_fp16: true

trt_analysis:
  enable: true
  log_path: "../logs/paddle_trt_fp16_analysis.log"
  report_json: "../benchmarks/trt_subgraph_report_fp16.json"
  report_md: "../benchmarks/trt_subgraph_report_fp16.md"

postprocess:
  mode: raw
  decode_backend: cpu
  nms_backend: cpu
  score_threshold: 0.25
  nms_threshold: 0.45
  top_k: 100

profile:
  enable_timer: true

output:
  save_result: false
  result_path: "../outputs/paddle_trt_result.txt"

benchmark:
  warmup_iters: 0
  benchmark_iters: 3
  output_csv: "../benchmarks/results.csv"
