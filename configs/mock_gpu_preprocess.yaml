# Mock config using CUDA GPU preprocessing.
# Requires -DENABLE_CUDA=ON and -DENABLE_OPENCV=ON.

input:
  source_type: synthetic
  path: "synthetic://mock"
  num_streams: 4
  num_frames: 300
  synthetic_width: 640
  synthetic_height: 360
  synthetic_channels: 3

model:
  input_width: 640
  input_height: 640
  num_classes: 3
  mock_num_boxes: 3

preprocess:
  type: gpu

infer:
  backend: mock
  precision: fp32
  batch_size: 4
  enable_dynamic_batch: true
  dynamic_batch_timeout_ms: 10

trt:
  enable: false
  workspace_size: 1073741824
  max_batch_size: 4
  min_subgraph_size: 3
  precision: fp32
  use_static: false
  use_calib_mode: false
  cache_dir: "../trt_cache"

postprocess:
  mode: mock_yolo
  decode_backend: cpu
  nms_backend: cpu
  score_threshold: 0.25
  nms_threshold: 0.45
  top_k: 100

profile:
  enable_timer: true

output:
  save_result: false
  result_path: "../outputs/mock_gpu_preprocess_result.txt"

benchmark:
  warmup_iters: 20
  benchmark_iters: 200
  output_csv: "../benchmarks/gpu_preprocess.csv"
